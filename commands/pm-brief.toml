description = "Generate a morning PM brief — open Asana tasks, inbox highlights, and what needs your attention today. Read-only."

prompt = """
Activate the PM skill. Generate my daily CE brief. Read-only — do NOT create or modify any Asana tasks.

You are my Project Manager. Give me a structured morning brief as a Customer Engineer for Gemini Code Assist.

1. Pull all my open Asana tasks across active projects
2. Scan Gmail for messages since yesterday that need my attention (unread, unanswered, action-required)
3. Scan GChat for direct messages or mentions that need a response
4. Synthesize everything into a prioritized brief

Output format:
## 🗓️ CE Brief — [today's date]

### 🔴 Urgent — Needs Attention Today
(tasks due today + customers actively waiting on me)

### 🟡 In Flight — Follow-Ups
(open tasks with recent activity or approaching deadlines)

### 🟢 Wins & Positive Signals
(any recent successes, positive customer sentiment, milestones)

### 📬 Inbox Items Not Yet in Asana
(emails/chats with potential action items — flagged but not created)

### 📋 Full Open Task List
(all open Asana tasks grouped by project)

Keep it tight. I should be able to read this in 2 minutes and know exactly what to do today.
"""
