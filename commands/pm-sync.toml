description = "Scan recent Gmail & GChat for customer signals and sync action items, follow-ups, and commitments to Asana."

prompt = """
Activate the PM skill.

You are my Project Manager. Scan my Gmail and GChat for the last {{args}} days (use 3 days if not specified).

Follow the full PM Skill sync workflow:
1. Discover my Asana workspace and projects
2. Read Gmail — find emails where I have a commitment, a customer is waiting, or there's an action item
3. Read GChat — find DMs and channel messages where I need to do something
4. Classify each signal using the CE signal taxonomy (pre-sales and post-sales patterns for Gemini Code Assist)
5. Deduplicate — check existing Asana tasks before creating anything new
6. Create Asana tasks for any new signals, using the correct naming format: [TAG] Description — Customer
7. End with a structured summary of what was created, skipped, and anything that needs manual review

Be precise. Create tasks only for clear action items. Skip FYIs and things already resolved.
"""
