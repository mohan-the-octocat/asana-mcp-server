description = "Create an Asana project from a JSON template definition. Reads the template JSON from the asana-templates/ directory and builds the full project structure (sections, tasks, milestones, subtasks) via API. Usage: /admin:setup-template ce-pipeline | customer-project | awareness | pre-sales"

prompt = """
Activate the Asana Admin skill. Build an Asana project from a JSON template definition.

Template requested: $1

## Step 1 — Load the Template Definition
Read the appropriate JSON file from ${extensionPath}/asana-templates/:

- "ce-pipeline"       → ce_pipeline_template.json        (Tier 1 — CE Pipeline project)
- "customer-project"  → customer_project_template.json   (Tier 2 — Customer Project Template)
- "awareness"         → awareness_session_task_template.json
- "pre-sales"         → pre_sales_task_template.json

Parse the JSON file contents into a definition object.

## Step 2 — Get Workspace
Call: get_workspaces()
→ Store: WORKSPACE_GID

## Step 3 — Scaffold the Project
Call: scaffold_project_from_definition(
  workspace_gid=WORKSPACE_GID,
  definition=<parsed JSON from Step 1>
)

This will create:
- The project in GCA GTM Team
- All sections in order
- All tasks in each section (milestones flagged with is_milestone=true)
- All subtasks nested under their parent tasks

## Step 4 — Report Results
Output a summary:

---
✅ **Project scaffolded from template**

**Project:** [name]
**Project GID:** [gid]
**Sections created:** N
**Tasks created:** N total

| Section | Tasks Created |
|---|---|
[one row per section]

**Next steps (manual in Asana UI):**

If template = "ce-pipeline":
1. Open "CE Pipeline" → Customize → Fields → Add Field
   Add all 15 GCA_GTM_ fields listed in required_custom_fields (run /admin:setup-fields first)
2. Set up 4 automation rules in the project:
   - Rule 1: Task moved to "✅ Closed-Won" → set GCA_GTM_Outcome = Closed-Won
   - Rule 2: Task moved to "❌ Closed-Lost" → set GCA_GTM_Outcome = Closed-Lost
   - Rule 3: Task moved to "💤 No Interest" → set GCA_GTM_Outcome = No Interest
   - Rule 4: GCA_GTM_Stage changes to "POC" → notify CE to run /admin:setup-template customer-project
3. You are ready to create opportunities: /pm:new-opportunity Awareness for <Company>

If template = "customer-project":
1. Open the project → Customize → Fields → Add all 17 GCA_GTM_ fields
2. Set up automation rules for stage transitions (POC → Hyper-Care → Steady-State)
3. Go to Project options → Save as Template → name it "Customer Project Template"
   This saves it for future use with create_project_from_template
---
"""
