description = "One-time setup: create all 17 CE practice custom fields at the org level in Asana, prefixed with GCA_GTM_ for uniqueness. All formerly-enum fields are now text type with allowed values documented in the description. Run this once after installing the extension."

prompt = """
Activate the Asana Admin skill. Create all 17 CE practice custom fields in the workspace.
All field names are prefixed with "GCA_GTM_" to ensure uniqueness in the shared org workspace.
All fields that were previously enum (single-select) are now TEXT type — allowed values are
documented in the description so users can enter the correct string directly.

## Step 1 — Get Workspace
Call: get_workspaces()
→ Store: WORKSPACE_GID (use the first workspace returned)

## Step 2 — Note on Idempotency
The create_custom_field tool has built-in duplicate detection — before creating any field, it
checks all existing GCA_GTM_ fields by name (case-insensitive). If a field already exists, it
returns status="already_exists" along with the existing GID. You do NOT need to pre-check manually.

## Step 3 — Create Fields in This Exact Order

Create each field below using create_custom_field(). For each, pass workspace_gid=WORKSPACE_GID
plus the parameters shown.

### Text Fields (formerly Enum — allowed values listed in description)

1. Name: "GCA_GTM_Stage" | field_type: "text"
   description: "Lifecycle stage. Allowed values: Awareness | Pre-Sales | POC | Hyper-Care | Steady-State"

2. Name: "GCA_GTM_Customer Health" | field_type: "text"
   description: "Customer health signal. Allowed values: 🟢 Green | 🟡 Yellow | 🔴 Red | ⚪ Not Started"

3. Name: "GCA_GTM_Outcome" | field_type: "text"
   description: "Opportunity outcome. Allowed values: Active | Promoted | Closed-Won | Closed-Lost | No Interest"

4. Name: "GCA_GTM_Risk Flag" | field_type: "text"
   description: "Risk status. Allowed values: None | At Risk | Blocked | Escalated | Going Cold"

5. Name: "GCA_GTM_Sales Motion" | field_type: "text"
   description: "Selling motion type. Allowed values: GCA Standalone | Gemini Enterprise"

### Currency / Number Fields

6. Name: "GCA_GTM_ARR Potential" | field_type: "currency" | currency_code: "USD"
   description: "Estimated annual recurring revenue in USD"

7. Name: "GCA_GTM_WAU Adoption %" | field_type: "number"
   description: "Weekly active user adoption percentage (0-100). Tier 2 only. Updated monthly from GCA admin console."

### Date Fields

8. Name: "GCA_GTM_Next Key Date" | field_type: "date"
   description: "Next milestone: session date, decision date, QBR, or renewal"

9. Name: "GCA_GTM_Contract Start Date" | field_type: "date"
   description: "Customer contract start date. Tier 2 only."

10. Name: "GCA_GTM_Renewal Date" | field_type: "date"
    description: "Contract renewal date. Tier 2 only."

### Text (URL) Fields

11. Name: "GCA_GTM_Vector Expert Request" | field_type: "text"
    description: "Link to Vector ER. Required within 7 days for Pre-Sales and POC stages."

12. Name: "GCA_GTM_Vector Opportunity / Workload" | field_type: "text"
    description: "Link to the CRM opportunity record in Vector. Required from Pre-Sales onwards."

### Text (Plain) Fields

13. Name: "GCA_GTM_Field Service Rep" | field_type: "text"
    description: "Name of the Seller / Account Executive owning the deal"

14. Name: "GCA_GTM_Platform CE" | field_type: "text"
    description: "Name of the Tech Sales Engineer supporting the deal"

15. Name: "GCA_GTM_Technical Account Manager" | field_type: "text"
    description: "TAM assigned for post-sales (Hyper-Care and Steady-State phases)"

### People Fields

16. Name: "GCA_GTM_CE Owner" | field_type: "people"
    description: "CE managing this account or opportunity"

17. Name: "GCA_GTM_Opstree Lead" | field_type: "people"
    description: "Assigned Opstree architect for this engagement"

## Step 4 — Report Results

After creating all fields, output a summary table:

| # | Field Name | Type | Status | GID |
|---|---|---|---|---|
[one row per field]

Status should be: ✅ Created | ⏭️ Already existed | ❌ Failed (with error)

Then add this note:
---
**Next steps:**
1. Go to each CE practice project in Asana → Customize → Fields → Add Field
   and add all 17 GCA_GTM_ fields to the project (they are now available org-wide)
2. Run /admin:setup-template ce-pipeline to scaffold the Tier 1 CE Pipeline project
3. Run /pm:new-opportunity to create your first opportunity with all fields set
---
"""
